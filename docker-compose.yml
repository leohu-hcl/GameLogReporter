services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      PORT: 3010
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/gamelog-reporter
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRE: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
    depends_on:
      - mongo
    volumes:
      - server-logs:/app/logs
    # seed 幂等：admin 已存在则跳过
    command: sh -c "node dist/scripts/seed-admin.js && node dist/app.js"

  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_* are baked at build time; must be browser-reachable URLs
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3010/api}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3010}
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - server

volumes:
  mongo-data:
  server-logs:
